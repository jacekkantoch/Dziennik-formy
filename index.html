function openBodyForm(existing){
  const b=existing||{};
  openSheet(existing?'Edytuj pomiar':'Nowy pomiar ciała',body=>{
    const date=el('input',{type:'date',value:b.date||todayKey(),max:todayKey()});
    const weight=el('input',{type:'number',inputmode:'decimal',min:20,max:400,step:'0.1',value:b.weight||'',placeholder:'kg'});
    const note=el('textarea',{placeholder:'Notatka (opcjonalnie)'}); note.value=b.note||'';
    body.appendChild(field('Data',date));
    body.appendChild(field('Waga (kg) — wymagane',weight));
    body.appendChild(field('Notatka',note));
    body.appendChild(el('button',{class:'btn primary block',onclick:()=>{
      clearErr(weight); const w=num(weight.value);
      if(!(w>=20&&w<=400)){showErr(weight,'Podaj wagę w zakresie 20–400 kg.');return;}
      const obj={id:b.id||uid(),date:date.value||todayKey(),weight:w,note:note.value.trim()};
      if(b.id){const i=S.bodyMeasurements.findIndex(x=>x.id===b.id);S.bodyMeasurements[i]=obj;}
      else S.bodyMeasurements.push(obj);
      // zaktualizuj wagę i zapotrzebowanie kaloryczne w profilu na podstawie najnowszego pomiaru
      if(S.profile){const lb=latestBody(); if(lb){S.profile.weight=lb.weight; S.profile.calorieGoal=calcCalorieGoal(S.profile);}}
      save(); closeSheet(); toast('Pomiar zapisany','ok');
      renderers[currentTab]&&renderers[currentTab]();
    }},existing?'Zapisz zmiany':'Dodaj pomiar'));
    if(existing){
      body.appendChild(el('button',{class:'btn danger block',style:'margin-top:10px',onclick:()=>{
        S.bodyMeasurements=S.bodyMeasurements.filter(x=>x.id!==b.id);
        if(S.profile){const lb=latestBody(); if(lb){S.profile.weight=lb.weight; S.profile.calorieGoal=calcCalorieGoal(S.profile);}}
        save();closeSheet();toast('Pomiar usunięty');renderers[currentTab]&&renderers[currentTab]();
      }},'Usuń pomiar'));
    }
  });
}
/* ---------- 19. STATYSTYKI ---------- */
let statsRange={days:30};
let statsSeg='weight';

function rangeBounds(){
  const to=todayKey();
  let from;
  if(statsRange.days==='all'){ // najwcześniejsza data w danych
    const all=[...S.workouts.map(w=>w.date),...S.meals.map(m=>m.date),...S.bodyMeasurements.map(b=>b.date)];
    from=all.length?all.sort()[0]:addDays(to,-30);
  }
  else from=addDays(to,-(statsRange.days-1));
  return {from,to};
}

renderers.stats=function(){
  const scr=$('#screen-stats'); scr.innerHTML='';
  scr.appendChild(el('div',{class:'topbar'},el('div',{},el('h1',{},'Statystyki'),el('div',{class:'sub'},'Twój postęp w liczbach'))));

  // przełącznik kategorii
  const catSel=el('select',{class:'select-plain','aria-label':'Kategoria statystyk',style:'margin:0 var(--space) 10px'},
    ...[['workout','Trening'],['nutrition','Żywienie'],['weight','Waga']].map(([k,lab])=>
      el('option',{value:k,selected:statsSeg===k},lab)));
  catSel.addEventListener('change',()=>{statsSeg=catSel.value;renderers.stats();});
  scr.appendChild(catSel); fitSelectWidth(catSel);

  // zakres
  const rangeSel=el('select',{class:'select-plain','aria-label':'Zakres dat',style:'margin:0 var(--space) 14px'},
    ...[['7','7 dni'],['30','30 dni'],['90','90 dni'],['all','Wszystko']].map(([v,lab])=>
      el('option',{value:v,selected:String(statsRange.days)===v},lab)));
  rangeSel.addEventListener('change',()=>{statsRange={days:rangeSel.value==='all'?'all':Number(rangeSel.value)};renderers.stats();});
  scr.appendChild(rangeSel); fitSelectWidth(rangeSel);
  const {from,to}=rangeBounds();
  scr.appendChild(el('p',{class:'label',style:'text-align:center;margin:-2px 0 12px;font-size:12px'},`${fmtDate(from)} – ${fmtDate(to)}`));

  const host=el('div'); scr.appendChild(host);
  if(statsSeg==='workout')statsWorkout(host,from,to);
  else if(statsSeg==='nutrition')statsNutrition(host,from,to);
  else statsWeight(host,from,to);
};

function statsWorkout(host,from,to){
  const list=S.workouts.filter(w=>w.completed!==false&&w.date>=from&&w.date<=to);
  if(!list.length){ host.appendChild(emptyState('dumbbell','Brak treningów w tym okresie','Zmień zakres lub dodaj trening.','',null)); return; }
  const totMin=list.reduce((s,w)=>s+num(w.duration),0);
  const totVol=list.reduce((s,w)=>s+workoutVolume(w),0);
  let sets=0; list.forEach(w=>(w.exercises||[]).forEach(e=>sets+=(e.sets||[]).filter(s=>!s.warmup).length));
  host.appendChild(metricCard('dumbbell','var(--train)','Podsumowanie treningów',null,card=>{
    card.appendChild(el('div',{},
      el('div',{class:'mnum',style:'color:var(--train)'},list.length+' '+plWord(list.length,'trening','treningi','treningów')),
      el('div',{class:'msub'},'Łączny czas: '+fmtDuration(totMin))));
    card.appendChild(el('div',{class:'row',style:'margin-top:14px'},
      el('div',{},el('div',{class:'label'},'Średni czas'),el('div',{style:'font-weight:700'},fmtDuration(totMin/list.length))),
      el('div',{},el('div',{class:'label'},'Objętość'),el('div',{style:'font-weight:700'},fmtNum(totVol)+' kg')),
      el('div',{style:'text-align:right'},el('div',{class:'label'},'Serie'),el('div',{style:'font-weight:700'},sets))));
  }));

  // objętość wg tygodni
  const byWeek={}; list.forEach(w=>{const wk=isoWeek(w.date);byWeek[wk]=(byWeek[wk]||0)+workoutVolume(w);});
  const weekKeys=Object.keys(byWeek).sort();
  const c1=el('div',{class:'card'}); c1.appendChild(el('h3',{},'Objętość wg tygodni'));
  c1.appendChild(barChart(weekKeys.map(k=>({y:byWeek[k],label:k.slice(6)})),{color:'var(--train)',label:'Objętość treningowa w kolejnych tygodniach'}));
  c1.appendChild(el('p',{class:'sr-only'},'Objętość: '+weekKeys.map(k=>k+': '+fmtNum(byWeek[k])+' kg').join('; ')));
  host.appendChild(c1);

  // częstotliwość partii
  const byMuscle={}; list.forEach(w=>(w.exercises||[]).forEach(e=>{byMuscle[e.muscle||'Inne']=(byMuscle[e.muscle||'Inne']||0)+1;}));
  const mK=Object.keys(byMuscle).sort((a,b)=>byMuscle[b]-byMuscle[a]);
  const c2=el('div',{class:'card'}); c2.appendChild(el('h3',{},'Trenowane partie'));
  const maxM=Math.max(...Object.values(byMuscle));
  mK.forEach(m=>{ c2.appendChild(el('div',{class:'row',style:'margin-bottom:4px'},el('span',{class:'label'},m),el('span',{style:'font-size:13px'},byMuscle[m]+'×')));
    c2.appendChild(el('div',{style:'margin-bottom:10px'},progressBar(byMuscle[m],maxM,'var(--train)'))); });
  host.appendChild(c2);

  // najczęstsze ćwiczenia
  const byEx={}; list.forEach(w=>(w.exercises||[]).forEach(e=>{byEx[e.name]=(byEx[e.name]||0)+1;}));
  const topEx=Object.keys(byEx).sort((a,b)=>byEx[b]-byEx[a]).slice(0,6);
  const c3=el('div',{class:'card'}); c3.appendChild(el('h3',{},'Najczęstsze ćwiczenia'));
  topEx.forEach((n,i)=>c3.appendChild(el('div',{class:'row',style:`padding:6px 0${i<topEx.length-1?';border-bottom:1px solid var(--sep)':''}`},el('span',{},esc(n)),el('span',{class:'label'},byEx[n]+'×'))));
  host.appendChild(c3);

  // progres wybranego ćwiczenia

  c4.appendChild(sel);
  const resizeSel=()=>fitSelectWidth(sel);
  const chartHost=el('div'); c4.appendChild(chartHost);
  const drawProg=()=>{ chartHost.innerHTML='';
    const pts=[]; list.slice().sort((a,b)=>a.date<b.date?-1:1).forEach(w=>{
      (w.exercises||[]).filter(e=>e.name===sel.value).forEach(e=>{
        const best=Math.max(0,...(e.sets||[]).filter(s=>!s.warmup).map(s=>e1RM(num(s.weight),intNum(s.reps))));
        if(best>0)pts.push({y:best,label:fmtDate(w.date,{short:true})});

  sel.addEventListener('change',()=>{resizeSel();drawProg();}); resizeSel(); drawProg();

function statsNutrition(host,from,to){
  // grupuj po dniach
  const days={}; S.meals.filter(m=>m.date>=from&&m.date<=to).forEach(m=>{
    const t=days[m.date]||(days[m.date]={kcal:0,protein:0,fat:0,carb:0});
    const f=num(m.amount)/100; t.kcal+=num(m.kcal100)*f;t.protein+=num(m.protein100)*f;t.fat+=num(m.fat100)*f;t.carb+=num(m.carb100)*f;
  });
  const dayKeys=Object.keys(days).sort();
  if(!dayKeys.length){ host.appendChild(emptyState('meal','Brak wpisów żywieniowych','Dodaj posiłki w zakładce Kalorie.','',null)); return; }
  const n=dayKeys.length;
  const avg=k=>dayKeys.reduce((s,d)=>s+days[d][k],0)/n;
  const goal=(S.profile&&S.profile.calorieGoal)||2000;
  const daysInGoal=dayKeys.filter(d=>Math.abs(days[d].kcal-goal)<=goal*0.1).length;
  host.appendChild(metricCard('meal','var(--cal)','Średnie dzienne',null,card=>{
    card.appendChild(el('div',{},
      el('div',{class:'mnum',style:'color:var(--cal)'},fmtNum(avg('kcal'))+' kcal'),

    card.appendChild(el('div',{class:'row',style:'margin-top:14px'},
      el('div',{},el('div',{class:'label'},'Białko'),el('div',{style:'font-weight:700;color:var(--protein)'},fmtNum(avg('protein'))+' g')),

      el('div',{style:'text-align:right'},el('div',{class:'label'},'Węglowodany'),el('div',{style:'font-weight:700;color:var(--carb)'},fmtNum(avg('carb'))+' g'))));
  }));

  const c1=el('div',{class:'card'}); c1.appendChild(el('h3',{},'Kalorie wg dni'));
  c1.appendChild(barChart(dayKeys.slice(-14).map(d=>({y:days[d].kcal,label:fmtDate(d,{short:true}).split(' ')[0]})),{color:'var(--cal)',label:'Kalorie w kolejnych dniach'}));
  c1.appendChild(el('p',{class:'sr-only'},'Kalorie: '+dayKeys.slice(-14).map(d=>fmtDate(d)+': '+fmtNum(days[d].kcal)).join('; ')));

  // najczęstsze produkty
  const byName={}; S.meals.filter(m=>m.date>=from&&m.date<=to).forEach(m=>{byName[m.name]=(byName[m.name]||0)+1;});
  const top=Object.keys(byName).sort((a,b)=>byName[b]-byName[a]).slice(0,6);

  top.forEach((n2,i)=>c2.appendChild(el('div',{class:'row',style:`padding:6px 0${i<top.length-1?';border-bottom:1px solid var(--sep)':''}`},el('span',{},esc(n2)),el('span',{class:'label'},byName[n2]+'×'))));
  host.appendChild(c2);
}

function statsWeight(host,from,to){
  const all=sortedBody();
  const inRange=all.filter(b=>b.date>=from&&b.date<=to);
  const p=S.profile;
  if(!all.length){ host.appendChild(emptyState('scale','Brak pomiarów wagi','Zapisz pierwszy pomiar, aby zobaczyć trend.','Dodaj pomiar',()=>openBodyForm())); return; }

  const start=all[0], cur=all[all.length-1];
  const target=(p&&p.targetWeight)||cur.weight;
  const change=cur.weight-start.weight;
  // zmiany 7/30 dni
  const wAgo=(days)=>{ const key=addDays(cur.date,-days); let best=null;
    all.forEach(b=>{ if(b.date<=key)best=b; }); return best; };
  const c7=wAgo(7), c30=wAgo(30);
  // tempo (kg/tydzień) na podstawie zakresu
  let rate=null; if(all.length>=2){ const span=daysBetween(start.date,cur.date)||1; rate=change/span*7; }
  const progress=target!==start.weight?clamp((start.weight-cur.weight)/(start.weight-target)*100,0,100):100;

  host.appendChild(metricCard('scale','var(--weight)','Masa ciała',null,card=>{
    card.style.position='relative';
    card.appendChild(el('div',{class:'row'},
      el('div',{class:'stack'},el('div',{class:'label'},'Aktualna waga'),el('div',{class:'mnum',style:'color:var(--weight)'},fmtNum(cur.weight,1)+' kg')),
      el('div',{class:'stack',style:'text-align:right'},el('div',{class:'label'},'Cel'),el('div',{class:'mid-num'},fmtNum(target,1)+' kg'))));
    card.appendChild(el('div',{style:'margin-top:12px'},progressBar(progress,100,'var(--weight)')));
    card.appendChild(el('p',{class:'label',style:'margin-top:6px;font-size:12px'},'Postęp do celu: '+fmtNum(progress)+'%'));
    card.appendChild(el('div',{style:'display:flex;justify-content:flex-end;margin-top:16px'},
      el('button',{class:'icon-btn','aria-label':'Dodaj pomiar',onclick:()=>openBodyForm(),html:ICONS.plus,
        style:'background:var(--weight);color:#fff'})));
  }));

  host.appendChild(statCard('Zmiany',[
    ['Waga początkowa',fmtNum(start.weight,1)+' kg'],
    ['Całkowita zmiana',(change>=0?'+':'')+fmtNum(change,1)+' kg'],
    ['Ostatnie 30 dni',c30?((cur.weight-c30.weight>=0?'+':'')+fmtNum(cur.weight-c30.weight,1)+' kg'):'—'],
    ['Ostatnie 7 dni',c7?((cur.weight-c7.weight>=0?'+':'')+fmtNum(cur.weight-c7.weight,1)+' kg'):'—'],
    ['Tempo',rate!=null?((rate>=0?'+':'')+fmtNum(rate,2)+' kg/tydz.'):'—']],'var(--weight)'));

  const c1=el('div',{class:'card'}); c1.appendChild(el('h3',{},'Trend wagi'));
  const pts=(inRange.length?inRange:all).map(b=>({y:b.weight,label:fmtDate(b.date,{short:true})}));
  c1.appendChild(lineChart(pts,{color:'var(--weight)',label:'Trend masy ciała'}));
  c1.appendChild(el('p',{class:'sr-only'},'Waga: '+pts.map(x=>x.label+': '+x.y+' kg').join('; ')));
  host.appendChild(c1);

  // historia
  const c3=el('div',{class:'card'}); c3.appendChild(el('h3',{},'Historia pomiarów'));
  [...all].reverse().forEach(b=>{
    const REVEAL=118;
    const swipeWrap=el('div',{class:'task-swipe'});
    const group=el('div',{class:'swipe-actions-group',style:'transform:scale(0);opacity:0'});
    group.appendChild(el('button',{class:'swipe-more','aria-label':'Szybkie akcje',html:ICONS.dots,
      onclick:e=>{e.stopPropagation();openBodyForm(b);}}));
    group.appendChild(el('button',{class:'swipe-del-pill','aria-label':'Usuń pomiar',
      onclick:e=>{e.stopPropagation();S.bodyMeasurements=S.bodyMeasurements.filter(x=>x.id!==b.id);save();renderers[currentTab]&&renderers[currentTab]();}},'Usuń'));
    swipeWrap.appendChild(el('div',{class:'task-swipe-actions',style:`width:${REVEAL}px`},group));
    const it=el('div',{class:'list-item tap'});
    it.appendChild(el('div',{class:'grow'},el('div',{class:'t1'},fmtNum(b.weight,1)+' kg'),
      el('div',{class:'t2'},fmtDate(b.date))));
    swipeWrap.appendChild(it);
    attachSwipeDelete(it,group,swipeWrap,REVEAL);
    c3.appendChild(swipeWrap);
  });
  host.appendChild(c3);
  host.appendChild(el('p',{class:'label',style:'text-align:center;font-size:12px;margin-top:4px'},'Komunikaty mają charakter wspierający — liczy się trend, nie pojedynczy pomiar.'));
}

/* ---------- 21. EKSPORT / IMPORT / USUWANIE ---------- */
function exportData(){
  try{
    const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=el('a',{href:url,download:`zdrowie-aktywnosc-${todayKey()}.json`});
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1000);
    toast('Dane wyeksportowane','ok');
  }catch(e){ toast('Błąd eksportu','err'); }
}
function importData(){
  const inp=el('input',{type:'file',accept:'application/json,.json',style:'display:none'});
  document.body.appendChild(inp);
  inp.addEventListener('change',()=>{
    const file=inp.files[0]; if(!file){inp.remove();return;}
    const reader=new FileReader();
    reader.onload=()=>{
      try{
        const data=JSON.parse(reader.result);
        if(typeof data!=='object'||data===null)throw new Error('format');
        confirmSheet('Importować dane?','Bieżące dane zostaną zastąpione zawartością pliku. Zalecany wcześniejszy eksport.',()=>{
          S=migrate(data); save();
          if(S.profile){ initNav(); go(currentTab); } else renderOnboard();
          renderers[currentTab]&&renderers[currentTab]();
          toast('Dane zaimportowane','ok');
        },{yes:'Importuj'});
      }catch(e){ toast('Nieprawidłowy plik JSON','err'); }
      inp.remove();
    };
    reader.onerror=()=>{toast('Błąd odczytu pliku','err');inp.remove();};
    reader.readAsText(file);
  });
  inp.click();
}
function deleteAllData(){
  confirmSheet('Usunąć wszystkie dane?','Ta operacja jest nieodwracalna. Wszystkie treningi, posiłki, pomiary i ustawienia zostaną trwale usunięte z tej przeglądarki.',()=>{
    confirmSheet('Na pewno?','Potwierdź ponownie, aby trwale usunąć wszystkie dane.',()=>{
      try{ localStorage.removeItem(CFG.storageKey); localStorage.removeItem(CFG.activeWorkoutKey); }catch(e){}
      S=defaultState(); activeWorkout=null;
      $('#nav').hidden=true; closeSheet(); renderOnboard();
      $$('.screen').forEach(s=>s.classList.remove('active')); $('#screen-onboard').classList.add('active');
      toast('Wszystkie dane usunięte');
    },{danger:true,yes:'Usuń trwale'});
  },{danger:true,yes:'Kontynuuj'});
}
function removeDemo(){
  confirmSheet('Usunąć dane demonstracyjne?','Usunięte zostaną tylko rekordy oznaczone jako demonstracyjne.',()=>{
    ['workouts','meals','bodyMeasurements'].forEach(k=>{ S[k]=S[k].filter(x=>!x.demo); });
    S.favoriteProducts=S.favoriteProducts.filter(x=>!x.demo);
    S.recentProducts=S.recentProducts.filter(x=>!x.demo);
    S.settings.demo=false; save(); closeSheet(); renderers[currentTab]&&renderers[currentTab](); toast('Usunięto dane demonstracyjne','ok');
  },{yes:'Usuń'});
}

/* ---------- 22. DANE DEMONSTRACYJNE ---------- */
function startDemo(){
  S=defaultState();
  S.profile={name:'Demo',birth:'1992-05-14',sex:'male',height:180,weight:82.5,targetWeight:78,
    activity:'moderate',goal:'lose',units:'metric',trainingsPerWeek:4};
  S.profile.calorieGoal=calcCalorieGoal(S.profile);
  S.settings.demo=true;
  const T=todayKey();
  // treningi (3 ostatnie tygodnie)
  const wNames=[['Push A',[['Wyciskanie sztangi leżąc','Klatka'],['Wyciskanie nad głowę','Barki'],['Prostowanie ramion','Triceps']]],
    ['Pull A',[['Podciąganie','Plecy'],['Wiosłowanie sztangą','Plecy'],['Uginanie ramion','Biceps']]],
    ['Nogi',[['Przysiad ze sztangą','Nogi'],['Hip thrust','Pośladki'],['Wznosy łydek','Łydki']]]];
  for(let wk=0;wk<3;wk++){ wNames.forEach((wn,i)=>{
    const date=addDays(T,-(wk*7+i*2+1));
    const exs=wn[1].map(([name,muscle])=>({id:uid(),name,muscle,sets:[
      {id:uid(),weight:'',reps:'',warmup:true,done:true,rpe:''},
      {id:uid(),weight:String(40+wk*2.5+i*10),reps:'8',warmup:false,done:true,rpe:'8'},
      {id:uid(),weight:String(40+wk*2.5+i*10),reps:'8',warmup:false,done:true,rpe:'8.5'},
      {id:uid(),weight:String(40+wk*2.5+i*10),reps:'6',warmup:false,done:true,rpe:'9'}]}));
    S.workouts.push({id:uid(),demo:true,name:wn[0],date,time:'18:00',startedAt:Date.now(),duration:55+i*5,note:'',energy:4,exercises:exs,completed:true});
  });}
  // produkty ulubione
  const prods=[
    {name:'Owsianka górska',brand:'',kcal100:372,protein100:12,fat100:7,carb100:60,fiber100:10,portion:60,unit:'g'},
    {name:'Pierś z kurczaka',brand:'',kcal100:165,protein100:31,fat100:3.6,carb100:0,fiber100:0,portion:150,unit:'g'},
    {name:'Ryż biały ugotowany',brand:'',kcal100:130,protein100:2.7,fat100:0.3,carb100:28,fiber100:0.4,portion:200,unit:'g'},
    {name:'Jajko',brand:'',kcal100:143,protein100:12.6,fat100:9.5,carb100:0.7,fiber100:0,portion:55,unit:'szt'},
    {name:'Banan',brand:'',kcal100:89,protein100:1.1,fat100:0.3,carb100:23,fiber100:2.6,portion:120,unit:'szt'},
    {name:'Twaróg półtłusty',brand:'',kcal100:133,protein100:18,fat100:5,carb100:3.5,fiber100:0,portion:150,unit:'g'}];
  prods.forEach(p=>{p.demo=true;S.favoriteProducts.push(p);S.recentProducts.push(p);});
  // posiłki na ostatnie 10 dni
  for(let d=0;d<10;d++){ const date=addDays(T,-d);
    const plan=[['breakfast',prods[0],60],['breakfast',prods[3],110],['lunch',prods[1],180],['lunch',prods[2],200],
      ['dinner',prods[5],200],['snack',prods[4],120]];
    plan.forEach(([meal,p,amt])=>{ S.meals.push({id:uid(),demo:true,date,meal,name:p.name,brand:p.brand,barcode:'',
      kcal100:p.kcal100,protein100:p.protein100,fat100:p.fat100,carb100:p.carb100,fiber100:p.fiber100,amount:amt,unit:p.unit}); });
  }
  // pomiary wagi (spadająca)
  for(let d=30;d>=0;d-=3){ S.bodyMeasurements.push({id:uid(),demo:true,date:addDays(T,-d),
    weight:Math.round((84-(30-d)*0.06)*10)/10,note:''}); }
  save();
  initNav(); go('dashboard');
  toast('Włączono tryb demonstracyjny','ok');
}

/* ---------- 23. INICJALIZACJA ---------- */
function init(){
  load();
  loadActiveWorkout();
  if(S.profile){ initNav(); go('dashboard'); }
  else { renderOnboard(); $('#nav').hidden=true; }
  // aktualizuj czas aktywnego treningu co minutę
  setInterval(()=>{ if(activeWorkout&&currentTab==='workout')tickActiveElapsed(); },30000);
  // ostrzeżenie przed opuszczeniem podczas aktywnego treningu (jest w localStorage, więc bezpieczne)
}
init();
</script>
